# -------------------------------
# Vim Shortcuts
# -------------------------------
# モードキーをVimスタイルに設定
setw -g mode-keys vi

set -g status-style "bg=#44475a,fg=#f8f8f2"
set -g status-left "#[fg=#282a36,bg=#50fa7b,bold] #S #[bg=#44475a] "
set -g status-right "#[fg=#f8f8f2,bg=#6272a4] %H:%M:%S #[fg=#282a36,bg=#bd93f9,bold] %Y-%m-%d "
set -g status-left-length 30
set -g status-right-length 50

# ペインボーダーの色
set -g pane-border-style "fg=#6272a4"
set -g pane-active-border-style "fg=#bd93f9"

# メッセージバーの色
set -g message-style "bg=#44475a,fg=#f8f8f2"

# -------------------------------
# Reload Configuration
# -------------------------------
# `Ctrl+A R`で設定ファイルをリロード
# unbind r
# bind r source-file ~/.tmux.conf

# ウィンドウ名に日付を表示
set -g window-status-current-format '#[fg=#f8f8f2,bg=#6272a4,bold] #I: #W#F '
set -g window-status-format '#[fg=#f8f8f2,bg=#44475a] #I: #W#F '

# Alt + 左/右でペインを切り替え
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R

# マウスを有効にする
set -g mouse on

# セッションを自動で復元する設定
set -g set-titles on
set -g set-titles-string '#T'

# -------------------------------
# History
# -------------------------------
# スクロールバックバッファのサイズを制限（メモリ使用量の抑制）
set -g history-limit 1000
