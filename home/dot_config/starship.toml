"$schema" = 'https://starship.rs/config-schema.json'
add_newline = false
palette = "dracula"
scan_timeout = 50
command_timeout = 500

# $env_var\
format = """
$hostname\
$os\
$username\
$directory\
[î‚°](bg:graphite fg:slate)\
$git_branch\
$git_status\
[î‚°](bg:graphite2 fg:graphite)\
$c\
$cpp\
$dart\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
${env_var.VIRTUAL_ENV}\
$swift\
$terraform\
[î‚°](bg:sky fg:graphite2)\
$direnv\
[î‚°](fg:sky)\
$status\
"""

right_format = "$time"

[hostname]
ssh_only = true
format = "[$hostname](bg:amber fg:on_amber bold)[î‚°](bg:rose fg:amber)"

# [container]
# disabled = false
# format = '[î‚°](bg:#585858 fg:#d0d0d0)[$container](bg:#585858 fg:#d0d0d0)'

[os]
disabled = false
style = "bg:rose fg:on_rose"

[os.symbols]
Windows = "îœڈ"
Ubuntu = "َ°•ˆ"
SUSE = "ïŒ”"
