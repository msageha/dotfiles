format = '[ $user]($style)[Ņé░](bg:slate fg:rose)'

# cwd
[directory]
truncation_length = 2
truncation_symbol = "ŌĆ”/"
use_os_path_sep = true
style = "bg:slate fg:on_slate bold"
format = "[$path]($style)"

substitutions = [
  { from = "Desktop", to = "’äł " },
  { from = "Documents", to = "¾░łÖ " },
  { from = "Downloads", to = "’ĆÖ " },
  { from = "Music", to = "¾░ØÜ " },
  { from = "Pictures", to = "’ĆŠ " },
  { from = "Works", to = "Ņ║┐ " },
  { from = "bitbucket.org", to = "Ņ£ā " },
  { from = "github.com", to = "Ņ¼Ć " },
  { from = "gitlab[^/]*", to = "ŅÖ£ ", regex = true },
  { from = "Dropbox", to = "Ņ£ć " },
]

[git_branch]
symbol = "Ņ£ź"
format = "[$symbol $branch ](bg:graphite fg:on_graphite bold)"

[git_status]
format = "[$all_status$ahead_behind](bg:graphite fg:attention_graphite)"

[c]
