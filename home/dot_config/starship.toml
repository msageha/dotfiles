format = '[ $user]($style)[î‚°](bg:slate fg:rose)'

# cwd
[directory]
truncation_length = 2
truncation_symbol = "â€¦/"
use_os_path_sep = true
style = "bg:slate fg:on_slate bold"
format = "[$path]($style)"

substitutions = [
  { from = "Desktop", to = "ï„ˆ " },
  { from = "Documents", to = "َ°ˆ™ " },
  { from = "Downloads", to = "ï€™ " },
  { from = "Music", to = "َ°‌ڑ " },
  { from = "Pictures", to = "ï€¾ " },
  { from = "Works", to = "î؛؟ " },
  { from = "bitbucket.org", to = "îœƒ " },
  { from = "github.com", to = "î¬€ " },
  { from = "gitlab[^/]*", to = "î™œ ", regex = true },
  { from = "Dropbox", to = "îœ‡ " },
]

[git_branch]
symbol = "îœ¥"
format = "[$symbol $branch ](bg:graphite fg:on_graphite bold)"

[git_status]
format = "[$all_status$ahead_behind](bg:graphite fg:attention_graphite)"

[c]
symbol = "َ°™± "
style = "bg:graphite2 fg:on_graphite2 italic"
version_format = "${major}.${minor}"
format = '[$symbol$version]($style)'

[cpp]
