# format = '[$symbol$context]($style)'

# last_pipe_status
[status]
disabled = false
style = "bg:burgundy fg:on_burgundy bold"
format = "[ $status ]($style)[î‚°](fg:burgundy bg:surface0)"

# time (right side)
[time]
disabled = false
style = "fg:on_slate"
format = "[َ°¥” $time]($style)"
time_format = "%H:%M:%S"

