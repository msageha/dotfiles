"$schema" = 'https://starship.rs/config-schema.json'
add_newline = false
palette = "dracula"
scan_timeout = 50
command_timeout = 500

# $env_var\
format = """
$hostname\
$os\
$username\
$directory\
[Ņé░](bg:graphite fg:slate)\
$git_branch\
$git_status\
[Ņé░](bg:graphite2 fg:graphite)\
$c\
$cpp\
$dart\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
${env_var.VIRTUAL_ENV}\
$swift\
$terraform\
[Ņé░](bg:sky fg:graphite2)\
$direnv\
[Ņé░](fg:sky)\
$status\
"""

right_format = "$time"

[hostname]
ssh_only = true
format = "[$hostname](bg:amber fg:on_amber bold)[Ņé░](bg:rose fg:amber)"

# [container]
# disabled = false
# format = '[Ņé░](bg:#585858 fg:#d0d0d0)[$container](bg:#585858 fg:#d0d0d0)'

[os]
disabled = false
style = "bg:rose fg:on_rose"

[os.symbols]
Windows = "Ņ£Å"
Ubuntu = "¾░Ģł"
SUSE = "’īö"
Raspbian = "¾░É┐"
