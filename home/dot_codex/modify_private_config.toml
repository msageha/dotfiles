{{- /* chezmoi:modify-template */ -}}
{{- /*
  ~/.codex/config.toml の既存値を base として、下の desired TOML に書いた key だけ上書きする。
  Codex CLI が追加する projects や tui などのローカル状態は温存する。
  analytics / otel.metrics_exporter は外部送信 (プロダクトイベント / Statsig メトリクス) の停止。
  otel のログ・トレース exporter はデフォルト none のため設定不要。
*/ -}}
{{- $desired := printf `
model = "gpt-5.6-terra"
model_reasoning_effort = "high"
model_reasoning_summary = "concise"
personality = "pragmatic"
approval_policy = "on-request"
approvals_reviewer = "auto_review"
sandbox_mode = "workspace-write"
project_doc_fallback_filenames = ["CLAUDE.md"]

[sandbox_workspace_write]
network_access = true

[agents]
max_threads = 6
max_depth = 1

[analytics]
enabled = false

[otel]
metrics_exporter = "none"

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp@latest"]
startup_timeout_ms = 20_000

[mcp_servers.chrome-devtools]
command = "npx"
args = ["-y", "chrome-devtools-mcp@latest"]
startup_timeout_ms = 20_000

[mcp_servers.playwright]
command = "npx"
args = ["-y", "@playwright/mcp@latest"]
startup_timeout_ms = 20_000

[model_providers.sakana]
name = "Sakana API"
base_url = "https://api.torafugu.app/v1"
env_key = "SAKANA_API_KEY"
wire_api = "responses"
stream_idle_timeout_ms = 600000

[model_providers.openrouter]
name = "OpenRouter"
base_url = "https://openrouter.ai/api/v1"
env_key = "OPENROUTER_API_KEY"
wire_api = "responses"
stream_idle_timeout_ms = 600000

[notice]
"hide_gpt-5.1-codex-max_migration_prompt" = true

[notice.model_migrations]
"gpt-5.1-codex-max" = "gpt-5.2-codex"
"gpt-5.2-codex" = "gpt-5.3-codex"

[projects.%q]
trust_level = "trusted"

[projects.%q]
trust_level = "trusted"
` (printf "%s/Works/src" .chezmoi.homeDir) (printf "%s/.local/share/chezmoi" .chezmoi.homeDir) | fromToml -}}
{{- if lookPath "dart" -}}
{{-   $desired = mergeOverwrite $desired (fromToml `
[mcp_servers.dart]
command = "dart"
args = ["mcp-server"]
startup_timeout_ms = 20_000
`) -}}
{{- end -}}
{{- if eq .chezmoi.os "darwin" -}}
{{-   $desired = mergeOverwrite $desired (fromToml `
[mcp_servers.xcode]
command = "xcrun"
args = ["mcpbridge"]
startup_timeout_ms = 20_000
`) -}}
{{- end -}}
{{- $current := dict -}}
{{- $stdin := "" -}}
{{- if hasKey .chezmoi "stdin" -}}
{{-   $stdin = trim .chezmoi.stdin -}}
{{- end -}}
{{- if $stdin -}}
{{-   $current = fromToml $stdin -}}
{{- end -}}
{{- mergeOverwrite $current $desired | toToml -}}
