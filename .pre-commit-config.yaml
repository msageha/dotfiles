# CLAUDE.md and the appended-system-prompt docs (CLAUDE-*.md) are verbatim;
# keep formatters and typos from rewriting them.
exclude: ^home/dot_claude/CLAUDE.*\.md$
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c # frozen: v6.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
        exclude: ^home/(dot_codex|dot_grok)/modify_private_config\.toml$
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-symlinks
      - id: destroyed-symlinks
      - id: check-executables-have-shebangs
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: detect-private-key
        exclude: ^home/dot_ssh/
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: 745eface02aef23e168a8afb6b5737818efbea95 # frozen: v0.11.0.1
    hooks:
      - id: shellcheck
        args: [--severity=warning]
        exclude: \.zsh$
  - repo: https://github.com/hadolint/hadolint
    rev: 57e1618d78fd469a92c1e584e8c9313024656623 # frozen: v2.14.0
    hooks:
      - id: hadolint
        args: [
          --ignore,
          DL3008,
          --ignore,
          DL3015,
          --ignore,
          DL3018,
          --ignore,
          DL3004,
        ]
  - repo: local
    hooks:
      - id: dprint-fmt
        name: Format json/yaml/markdown/toml with dprint
        language: system
        entry: mise exec -- dprint fmt --allow-no-files
        types_or: [json, yaml, markdown, toml]
  - repo: https://github.com/crate-ci/typos
    rev: 37bb98842b0d8c4ffebdb75301a13db0267cef89 # frozen: v1.47.2
    hooks:
      - id: typos
  - repo: https://github.com/rhysd/actionlint
    rev: 914e7df21a07ef503a81201c76d2b11c789d3fca # frozen: v1.7.12
    hooks:
      - id: actionlint-system
