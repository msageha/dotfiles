name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
permissions:
  contents: read
env:
  # mise の ubi/aqua backend をはじめ各ステップが GitHub API を叩くため、
  # 無認証だと runner の共有 IP で rate limit (60 req/h) に当たる。
  # 全ジョブ・全ステップで Actions のエフェメラルトークンを使い認証付きにする
  GITHUB_TOKEN: ${{ github.token }}
jobs:
  prek:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install mise
        run: curl https://mise.run | sh
      - name: Run prek
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          mise install
          mise exec -- prek run --all-files
  chezmoi:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install chezmoi
        run: |
          sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Pre-configure chezmoi
        run: |
          mkdir -p "$HOME/.config/chezmoi"
          cat <<EOF > "$HOME/.config/chezmoi/chezmoi.toml"
          [data]
          computer_name = "ci-${{ matrix.os }}"
          skip_cli_tools = false
          skip_gui_tools = true

          [data.github]
          user = "msageha"

          [data.apiKeys]
          gemini = ""
          googleMaps = ""
          fugu = ""
          openRouter = ""
          EOF
      - name: Initialize chezmoi
        run: chezmoi init --source=${{ github.workspace }}
      - name: Test chezmoi apply (dry-run)
        run: chezmoi apply --source=${{ github.workspace }} --dry-run --verbose
      - name: Apply chezmoi
        run: chezmoi apply --source=${{ github.workspace }}
      - name: Install bats
        run: |
          if command -v brew &>/dev/null; then
            brew install bats-core
          else
            sudo apt-get update && sudo apt-get install -y bats
          fi
      - name: Run bats tests
        run: |
          # ~/.bash_profile は対話用で、環境によっては非ゼロを返すコマンドを含む。
          # ステップは bash -e で走るため、source をそのまま実行すると PATH 設定
          # 途中で中断しうる。source 中だけ -e を外し、最後まで環境を読み込ませる。
          set +e
          # shellcheck disable=SC1090
          source ~/.bash_profile
          set -e
          make test
  chezmoi-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install chezmoi
        shell: powershell
        run: |
          $chezmoiBin = Join-Path $HOME '.local\bin'
          iex "&{$(irm 'https://get.chezmoi.io/ps1')} -b '$chezmoiBin'"
          Add-Content -Path $env:GITHUB_PATH -Value $chezmoiBin
      - name: Pre-configure chezmoi
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path (Join-Path $HOME '.config\chezmoi') | Out-Null
          @'
          [data]
          # false にするとコーディングエージェント CLI のインストールも CI で実行される
          # (Linux の skip_cli_tools=false 相当)
          skip_windows_extras = true

          [data.github]
          user = "msageha"

          [data.apiKeys]
          gemini = ""
          googleMaps = ""
          fugu = ""
          openRouter = ""
          '@ | Set-Content -Path (Join-Path $HOME '.config\chezmoi\chezmoi.toml') -Encoding utf8
      - name: Initialize chezmoi
        shell: powershell
        run: chezmoi init --source=${{ github.workspace }}
      - name: Test chezmoi apply (dry-run)
        shell: powershell
        run: chezmoi apply --source=${{ github.workspace }} --dry-run --verbose
      - name: Apply chezmoi
        shell: powershell
        run: chezmoi apply --source=${{ github.workspace }}
