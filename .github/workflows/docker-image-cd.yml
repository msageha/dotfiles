name: Docker Image Continuous Deployment (CD)
on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types:
      - completed
env:
  IMAGE: msageha/dotfiles
permissions:
  contents: read
jobs:
  build:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        # Makefile の build-multi-platform と同じバリアントに加え、GPU (amd64 のみ) を含める。
        # GPU は arm64 を持たないため下の exclude で arm64 の組み合わせを除外する。
        # GUI フル構成 (ubuntu-full) は multi-arch 対象外のため含めない。
        variant:
          - tag: ubuntu-min
            base: ubuntu:26.04
            skip_cli_tools: "true"
            file: docker/Dockerfile.debian
          - tag: ubuntu
            base: ubuntu:26.04
            skip_cli_tools: "false"
            file: docker/Dockerfile.debian
          - tag: debian-min
            base: debian:trixie
            skip_cli_tools: "true"
            file: docker/Dockerfile.debian
          - tag: debian
            base: debian:trixie
            skip_cli_tools: "false"
            file: docker/Dockerfile.debian
          - tag: debian-slim-min
            base: debian:trixie-slim
            skip_cli_tools: "true"
            file: docker/Dockerfile.debian
          - tag: alpine
            base: alpine:latest
            skip_cli_tools: "true"
            file: docker/Dockerfile.alpine
          - tag: ubuntu-gpu
            base: nvidia/cuda:13.3.0-base-ubuntu26.04
            skip_cli_tools: "false"
            file: docker/Dockerfile.debian
        platform:
          - os: linux/amd64
            runner: ubuntu-latest
          - os: linux/arm64
            runner: ubuntu-26.04-arm
        # GPU (ubuntu-gpu) は amd64 のみ。arm64 の組み合わせを除外する。
        # マトリクス値がオブジェクトのため、exclude では該当エントリを完全一致で指定する。
        exclude:
          - variant:
              tag: ubuntu-gpu
              base: nvidia/cuda:13.3.0-base-ubuntu26.04
              skip_cli_tools: "false"
              file: docker/Dockerfile.debian
            platform:
              os: linux/arm64
              runner: ubuntu-26.04-arm
    steps:
      - name: Prepare platform pair
        run: |
          platform="${{ matrix.platform.os }}"
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"
      - name: Checkout source code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Log in to DockerHub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ${{ matrix.variant.file }}
          platforms: ${{ matrix.platform.os }}
          build-args: |
            BASE_IMAGE=${{ matrix.variant.base }}
            SKIP_CLI_TOOLS=${{ matrix.variant.skip_cli_tools }}
            SKIP_GUI_TOOLS=true
          provenance: false
          # GitHub のレート制限回避のため token を BuildKit secret で渡す (任意)。
          secrets: |
            github_token=${{ github.token }}
          cache-from: type=gha,scope=${{ matrix.variant.tag }}-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant.tag }}-${{ env.PLATFORM_PAIR }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"
      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          # PLATFORM_PAIR は必ず linux- で始まるため、merge 側の
          # "digests-<tag>-linux-*" で ubuntu / ubuntu-min のような接頭辞衝突を避けられる。
          name: digests-${{ matrix.variant.tag }}-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1
  merge:
    runs-on: ubuntu-latest
    needs:
      - build
    strategy:
      fail-fast: false
      matrix:
        tag:
          - ubuntu-min
          - ubuntu
          - debian-min
          - debian
          - debian-slim-min
          - alpine
          - ubuntu-gpu
    steps:
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-${{ matrix.tag }}-linux-*
          merge-multiple: true
      - name: Log in to DockerHub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          # shellcheck disable=SC2046
          docker buildx imagetools create -t "${IMAGE}:${{ matrix.tag }}" \
            $(printf "${IMAGE}@sha256:%s " *)
      - name: Inspect image
        run: docker buildx imagetools inspect "${IMAGE}:${{ matrix.tag }}"
