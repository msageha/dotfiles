name: chezmoi

# ci.yaml から reusable workflow として呼び出される。
# pull_request / workflow_dispatch のトリガーは ci.yaml 側が持つ。
on:
  workflow_call:
    inputs:
      fail-fast:
        description: "失敗時に呼び出し元の run 全体をキャンセルして他の並列チェックを止める"
        type: boolean
        required: false
        default: false

permissions:
  contents: read
  # fail-fast step (gh run cancel) に必要。呼び出し元でも同じ権限を付与すること
  # (called workflow の GITHUB_TOKEN は caller の権限を超えられない)
  actions: write

env:
  # chezmoi apply が実行する mise install (ubi/aqua backend) をはじめ各ステップが
  # GitHub API を叩くため、無認証だと runner の共有 IP で rate limit (60 req/h) に当たる。
  # Actions のエフェメラルトークンを使い認証付きにする
  GITHUB_TOKEN: ${{ github.token }}

jobs:
  chezmoi:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install chezmoi
        run: |
          sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Pre-configure chezmoi
        run: |
          mkdir -p "$HOME/.config/chezmoi"
          cat <<EOF > "$HOME/.config/chezmoi/chezmoi.toml"
          [data]
          computer_name = "ci-${{ matrix.os }}"
          # macOS / Linux 共通。CLI ツールとコーディングエージェント設定は CI で検証し、
          # GUI 系 (フォント・ghostty・cask) はスキップする
          skip_cli_tools = false
          skip_gui_tools = true

          [data.github]
          user = "msageha"

          [data.apiKeys]
          gemini = ""
          googleMaps = ""
          fugu = ""
          openRouter = ""
          EOF
      - name: Initialize chezmoi
        run: chezmoi init --source=${{ github.workspace }}
      - name: Test chezmoi apply (dry-run)
        run: chezmoi apply --source=${{ github.workspace }} --dry-run --verbose
      - name: Apply chezmoi
        run: chezmoi apply --source=${{ github.workspace }}
      - name: Install bats
        run: |
          if command -v brew &>/dev/null; then
            brew install bats-core
          else
            sudo apt-get update && sudo apt-get install -y bats
          fi
      - name: Run bats tests
        run: |
          # ~/.bash_profile は対話用で、環境によっては非ゼロを返すコマンドを含む。
          # ステップは bash -e で走るため、source をそのまま実行すると PATH 設定
          # 途中で中断しうる。source 中だけ -e を外し、最後まで環境を読み込ませる。
          set +e
          # shellcheck disable=SC1090
          source ~/.bash_profile
          set -e
          make test
      # fail-fast: run 全体をキャンセルして並列で走る他のチェックを止める。
      # run と各 job の conclusion は cancelled になるが、失敗した step は failure として記録に残る。
      - name: Cancel the entire run on failure
        if: failure() && inputs.fail-fast
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run cancel "$GITHUB_RUN_ID" --repo "$GITHUB_REPOSITORY"
  chezmoi-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install chezmoi
        shell: powershell
        run: |
          $chezmoiBin = Join-Path $HOME '.local\bin'
          iex "&{$(irm 'https://get.chezmoi.io/ps1')} -b '$chezmoiBin'"
          Add-Content -Path $env:GITHUB_PATH -Value $chezmoiBin
      - name: Pre-configure chezmoi
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path (Join-Path $HOME '.config\chezmoi') | Out-Null
          @'
          [data]
          # false にするとコーディングエージェント CLI のインストールも CI で実行される
          # (Linux の skip_cli_tools=false 相当)
          skip_windows_extras = true

          [data.github]
          user = "msageha"

          [data.apiKeys]
          gemini = ""
          googleMaps = ""
          fugu = ""
          openRouter = ""
          '@ | Set-Content -Path (Join-Path $HOME '.config\chezmoi\chezmoi.toml') -Encoding utf8
      - name: Initialize chezmoi
        shell: powershell
        run: chezmoi init --source=${{ github.workspace }}
      - name: Test chezmoi apply (dry-run)
        shell: powershell
        run: chezmoi apply --source=${{ github.workspace }} --dry-run --verbose
      - name: Apply chezmoi
        shell: powershell
        run: chezmoi apply --source=${{ github.workspace }}
      # fail-fast: run 全体をキャンセルして並列で走る他のチェックを止める
      - name: Cancel the entire run on failure
        if: failure() && inputs.fail-fast
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run cancel "$env:GITHUB_RUN_ID" --repo "$env:GITHUB_REPOSITORY"
